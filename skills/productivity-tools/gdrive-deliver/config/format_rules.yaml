# Format classification overrides for Google Drive delivery.
# Patterns are matched against filenames using glob syntax.

overrides:
  # Human-readable → Convert to Google Doc
  human:
    - "*_REPORT.md"
    - "*_ANALYSIS.md"
    - "*_SUMMARY.md"
    - "*_BRIEF.md"
    - "*_UPDATE.md"
    - "*_PRESS_RELEASE.md"

  # AI/Machine-only → Upload as raw .md
  ai:
    - "SKILL.md"
    - "CLAUDE.md"
    - "README.md"
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.py"
    - "*.sh"

  # Both human + AI → Well-formatted .md (Drive previews it)
  both:
    - "*_GUIDE.md"
    - "*_REFERENCE.md"
    - "*_PROFILES.md"
    - "*_DOCS.md"
    - "*_INDEX.md"

# Default sharing recipients
sharing:
  default_emails:
    - jorian.bos@supra-forge.com
    - tobias.mueller@supra-forge.com

# Drive configuration
drive:
  service_account_path: enora_drive_service_account.json
